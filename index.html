<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry, Love 🐱💙</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00c6ff);
    font-family:'Comic Sans MS', cursive, sans-serif;
}

.container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:30px;
    text-align:center;
    color:white;
    width:90%;
    max-width:700px;
    box-shadow:0 0 30px rgba(255,255,255,0.3);
    z-index:10;
}

h1{
    font-size:2.5rem;
    margin-bottom:20px;
    animation:pulse 2s infinite;
}

p{
    font-size:1.3rem;
    margin:15px 0;
    line-height:1.6;
}

.question{
    font-size:2rem;
    margin-top:25px;
    font-weight:bold;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

/* Falling Hearts */
.heart{
    position:absolute;
    top:-50px;
    color:#ffffff;
    font-size:25px;
    animation:fall linear infinite;
    opacity:0.8;
}

@keyframes fall{
    0%{
        transform:translateY(-50px) rotate(0deg);
        opacity:1;
    }
    100%{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>I'm Sorry, Love 🐱💙</h1>

    <p>🐱 I know I hurt you, and I'm truly sorry. 🥺💙</p>

    <p>🌸🐱 You mean so much to me and I never want to lose you. 💙🍓</p>

    <p>🐱💙 Every moment with you is special. 💙🐱</p>

    <p>🧁🍓🐱 I can't change the past, but I can promise to learn from my mistakes and be better. 🐱💙🌸</p>

    <p>💙🐱🌸🍓🧁🐱💙</p>

    <div class="question">
        🥺🐱 Can you forgive me? 💙🐱
    </div>
</div>

<script>
function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');

    const hearts = ['💙','💖','💙','💕','💙','💗'];
    heart.innerHTML = hearts[Math.floor(Math.random()*hearts.length)];

    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.animationDuration = (Math.random()*4 + 4) + 's';
    heart.style.fontSize = (Math.random()*20 + 20) + 'px';

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 8000);
}

setInterval(createHeart, 250);
</script>

</body>
</html>
